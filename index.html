// Inside your <script type="module">
window.login = async function() {
    const username = document.getElementById('usernameInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorMsg = document.getElementById('errorMsg');
    
    try {
        const q = query(collection(db, 'users'), where('username', '==', username));
        const snapshot = await getDocs(q);
        
        if (!snapshot.empty) {
            const user = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
            
            if (user.password === password) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('welcomeUser').textContent = `مرحباً، ${user.name || user.username}`;
                
                // Show/Hide menu items based on role
                const isManager = user.role === 'manager';
                const managerIds = ['menuExpenses', 'menuDeposits', 'menuExpenseCategories', 'menuReturns', 'menuEditOrders', 'menuShiftHistory', 'menuInventory', 'menuInventoryAdjust', 'menuUsers', 'menuCategories', 'menuAdmin', 'menuReports', 'menuSettings', 'menuRevenues'];
                
                managerIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.style.display = isManager ? 'block' : 'none';
                    }
                });
                
                errorMsg.style.display = 'none';
            } else {
                errorMsg.textContent = 'كلمة المرور غير صحيحة';
                errorMsg.style.display = 'block';
            }
        } else {
            errorMsg.textContent = 'المستخدم غير موجود';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'خطأ: ' + err.message;
        errorMsg.style.display = 'block';
    }
};
