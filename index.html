<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dr shrimp - POS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #2980b9, #3498db); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px; }
        .login-box h2 { color: #2980b9; margin-bottom: 10px; font-size: 28px; }
        .login-box p { color: #777; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .login-box button { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .login-box button:hover { background: #3498db; }
        .error-msg { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>dr shrimp</h2>
        <p>نظام إدارة المطاعم</p>
        <input type="text" id="usernameInput" placeholder="اسم المستخدم">
        <input type="password" id="passwordInput" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCucVCBRWZHQmvOf7XEG03MQuHFUvMfZes",
            authDomain: "dr-shrimp-pos.firebaseapp.com",
            projectId: "dr-shrimp-pos",
            storageBucket: "dr-shrimp-pos.firebasestorage.app",
            messagingSenderId: "165111064355",
            appId: "1:165111064355:web:452d718520d50bff6d8e96"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = async function() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.innerText = 'جاري...';
            errorMsg.style.display = 'block';
            
            try {
                const snapshot = await getDocs(query(collection(db, 'users'), where('username', '==', username)));
                
                if (!snapshot.empty) {
                    const user = snapshot.docs[0].data();
                    if (user.password === password) {
                        alert('✅ تم تسجيل الدخول بنجاح!');
                        // هنا هتحط الكود اللي يودي للداشبورد
                    } else {
                        errorMsg.innerText = 'كلمة المرور خطأ!';
                    }
                } else {
                    errorMsg.innerText = 'المستخدم غير موجود!';
                }
            } catch (err) {
                errorMsg.innerText = 'خطأ: ' + err.message;
            }
        };

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
